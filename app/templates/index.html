{% extends "base.html" %}

{% block title %}Shop — Kcell Store{% endblock %}
{% block nav_shop %}is-active{% endblock %}

{% block content %}
<div class="container">
    <header class="page-header">
        <h1>Shop</h1>
        <p>Premium devices, delivered fast across Kazakhstan.</p>
    </header>

    <div class="product-grid">
        <article class="product-card">
            <div class="product-card__image" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" />
                </svg>
            </div>
            <div class="product-card__body">
                <h2 class="product-card__title">iPhone 16 Pro</h2>
                <p class="product-card__desc">Apple flagship smartphone</p>
                <p class="product-card__price">699 990 ₸</p>
                <div class="product-card__actions">
                    <form action="/orders-page">
                        <button type="submit" class="btn btn--primary">
                            Buy now
                        </button>
                    </form>
                </div>
            </div>
        </article>
    </div>
</div>
{% endblock %}
