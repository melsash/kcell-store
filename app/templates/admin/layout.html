{% extends "base.html" %}

{% block extra_head %}
<style>
    .admin-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 32px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border);
    }

    .admin-nav a {
        padding: 8px 16px;
        border-radius: 999px;
        font-size: 0.9375rem;
        font-weight: 500;
        color: var(--text-muted);
        background: var(--surface);
        border: 1px solid var(--border);
        transition: color 0.2s, background 0.2s, border-color 0.2s;
    }

    .admin-nav a:hover {
        color: var(--text);
        border-color: #b8b8bd;
    }

    .admin-nav a.is-active {
        color: var(--accent);
        background: var(--accent-light);
        border-color: transparent;
    }

    .admin-cards {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 24px;
    }

    .admin-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 24px;
        box-shadow: var(--shadow-sm);
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .admin-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
    }

    .admin-card h2 {
        margin: 0 0 8px;
        font-size: 1.125rem;
    }

    .admin-card p {
        margin: 0 0 16px;
        color: var(--text-muted);
        font-size: 0.9375rem;
    }

    .admin-card__stat {
        font-size: 2rem;
        font-weight: 700;
        color: var(--accent);
        margin-bottom: 16px;
    }

    .admin-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
    }

    .admin-table-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
        box-shadow: var(--shadow-sm);
    }

    .admin-table {
        width: 100%;
        border-collapse: collapse;
    }

    .admin-table th,
    .admin-table td {
        padding: 14px 20px;
        text-align: left;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
    }

    .admin-table th {
        font-size: 0.8125rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--text-muted);
        background: var(--bg);
    }

    .admin-table tr:last-child td {
        border-bottom: none;
    }

    .admin-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }

    .btn--link {
        background: transparent;
        color: var(--accent);
        border: none;
        box-shadow: none;
        width: auto;
        min-height: auto;
        padding: 0;
        font-weight: 600;
    }

    .btn--link:hover {
        text-decoration: underline;
        box-shadow: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <header class="page-header">
        <h1>{% block admin_title %}Admin{% endblock %}</h1>
        <p>{% block admin_subtitle %}Manage your store{% endblock %}</p>
    </header>

    <nav class="admin-nav" aria-label="Admin navigation">
        <a href="/admin" class="{% block nav_admin_dashboard %}{% endblock %}">Dashboard</a>
        <a href="/admin/products" class="{% block nav_admin_products %}{% endblock %}">Products</a>
        <a href="/admin/orders" class="{% block nav_admin_orders %}{% endblock %}">Orders</a>
    </nav>

    {% block admin_content %}{% endblock %}
</div>
{% endblock %}
