{% extends "base.html" %}

{% block title %}Order Successful — Kcell Store{% endblock %}

{% block content %}
<div class="container">
    <div class="success-panel">
        <div class="success-panel__icon" aria-hidden="true">✓</div>
        <h1>Order created successfully</h1>
        <p>Thank you for your purchase.</p>
        <p class="success-panel__order-id">Order ID: {{ order_id }}</p>
        <div class="btn-row">
            <a href="/shop" class="btn btn--primary">Continue shopping</a>
            <a href="/orders-page" class="btn btn--ghost">Checkout</a>
        </div>
    </div>
</div>
{% endblock %}
