{% extends "base.html" %}

{% block title %}Create Order — Kcell Store{% endblock %}
{% block nav_orders %}is-active{% endblock %}

{% block content %}
<div class="container">
    <div class="order-panel">
        <h1>Create Order</h1>
        <p class="order-panel__subtitle">Enter your details to complete your purchase.</p>

        <form>
            <div class="form-group">
                <label for="customer-name">Your name</label>
                <input
                    id="customer-name"
                    class="form-input"
                    type="text"
                    placeholder="Your name"
                >
            </div>

            <div class="form-group">
                <label for="phone-number">Phone number</label>
                <input
                    id="phone-number"
                    class="form-input"
                    type="text"
                    placeholder="Phone number"
                >
            </div>

            <button type="submit" class="btn btn--primary">
                Place Order
            </button>
        </form>
    </div>
</div>
{% endblock %}
