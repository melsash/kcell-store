<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kcell Store{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --text: #1d1d1f;
            --text-muted: #6e6e73;
            --border: #d2d2d7;
            --accent: #6b2d9e;
            --accent-hover: #55247e;
            --accent-light: rgba(107, 45, 158, 0.08);
            --radius: 12px;
            --radius-lg: 18px;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 24px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.12);
            --container: 1120px;
            --header-h: 64px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 16px;
            line-height: 1.5;
            color: var(--text);
            background: var(--bg);
            -webkit-font-smoothing: antialiased;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .site-header {
            position: sticky;
            top: 0;
            z-index: 100;
            height: var(--header-h);
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        .header-inner {
            max-width: var(--container);
            margin: 0 auto;
            padding: 0 24px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.125rem;
            letter-spacing: -0.02em;
        }

        .logo-mark {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent) 0%, #9b4dca 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 0.9375rem;
            font-weight: 500;
            color: var(--text-muted);
            transition: color 0.2s, background 0.2s;
        }

        .nav-links a:hover {
            color: var(--text);
            background: rgba(0, 0, 0, 0.04);
        }

        .nav-links a.is-active {
            color: var(--accent);
            background: var(--accent-light);
        }

        .site-main {
            flex: 1;
            width: 100%;
        }

        .container {
            max-width: var(--container);
            margin: 0 auto;
            padding: 40px 24px 64px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-header h1 {
            margin: 0 0 8px;
            font-size: clamp(1.75rem, 4vw, 2.25rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.15;
        }

        .page-header p {
            margin: 0;
            color: var(--text-muted);
            font-size: 1.0625rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .product-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-sm);
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: transparent;
        }

        .product-card__image {
            aspect-ratio: 4 / 3;
            background: linear-gradient(145deg, #f0f0f5 0%, #e8e8ed 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .product-card__image svg {
            width: 64px;
            height: 64px;
            opacity: 0.35;
        }

        .product-card__body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 8px;
        }

        .product-card__title {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .product-card__desc {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.9375rem;
            flex: 1;
        }

        .product-card__price {
            margin: 8px 0 0;
            font-size: 1.375rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .product-card__actions {
            margin-top: 16px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 44px;
            padding: 0 24px;
            font-family: inherit;
            font-size: 0.9375rem;
            font-weight: 600;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn--primary {
            width: 100%;
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 8px rgba(107, 45, 158, 0.35);
        }

        .btn--primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 16px rgba(107, 45, 158, 0.4);
        }

        .order-panel {
            max-width: 440px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            padding: 32px;
            box-shadow: var(--shadow-md);
        }

        .order-panel h1 {
            margin: 0 0 8px;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .order-panel__subtitle {
            margin: 0 0 28px;
            color: var(--text-muted);
            font-size: 0.9375rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .form-input {
            width: 100%;
            min-height: 48px;
            padding: 12px 16px;
            font-family: inherit;
            font-size: 1rem;
            color: var(--text);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .form-input::placeholder {
            color: #a1a1a6;
        }

        .form-input:hover {
            border-color: #b8b8bd;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--surface);
            box-shadow: 0 0 0 4px var(--accent-light);
        }

        .order-panel .btn--primary {
            margin-top: 8px;
        }

        .site-footer {
            margin-top: auto;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }

        .footer-inner {
            max-width: var(--container);
            margin: 0 auto;
            padding: 32px 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .footer-copy {
            margin: 0;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .footer-links {
            display: flex;
            gap: 24px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .footer-links a {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--accent);
        }

        @media (max-width: 768px) {
            .header-inner {
                padding: 0 16px;
            }

            .container {
                padding: 24px 16px 48px;
            }

            .product-grid {
                grid-template-columns: 1fr;
            }

            .order-panel {
                padding: 24px 20px;
            }

            .footer-inner {
                flex-direction: column;
                text-align: center;
                padding: 24px 16px;
            }

            .footer-links {
                justify-content: center;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="/shop" class="logo">
                <span class="logo-mark">K</span>
                <span>Kcell Store</span>
            </a>
            <nav aria-label="Main navigation">
                <ul class="nav-links">
                    <li>
                        <a href="/shop" class="{% block nav_shop %}{% endblock %}">Shop</a>
                    </li>
                    <li>
                        <a href="/orders-page" class="{% block nav_orders %}{% endblock %}">Orders</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="site-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <p class="footer-copy">&copy; 2026 Kcell Store. All rights reserved.</p>
            <ul class="footer-links">
                <li><a href="/shop">Shop</a></li>
                <li><a href="/orders-page">Create order</a></li>
            </ul>
        </div>
    </footer>
</body>
</html>
